spring:
  h2:
    console:
      enabled:true

  application:
    name: gayeongsignup

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${CONNECTION_URL}?serverTimezone=UTC
    username: ${CONNECTION_USERNAME}
    password: ${CONNECTION_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update #update(테이블 그대로 사용) #create(테이블 초기화)
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com  # Gmail의 SMTP 서버 호스트
    port: 587 # Gmail SMTP 서버는 587번 포트를 사용
    username: ${SERVER_EMAIL}
    password: ${SERVER_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true # SMTP 서버에 인증 필요한 경우 true로 지정 Gmail은 요구함
          starttls:
            enable: true # SMTP 서버가 TLS를 사용하여 안전한 연결을 요구하는 경우 true로 설정
            required: true
          connection timeout: 5000 # 클라이언트가 SMTP 서버와의 연결을 설정하는 데 대기해야 하는 시간
          timeout: 5000 # 클라이언트가 SMTP 서버로부터 응답을 대기해야 하는 시간
          writetimeout: 5000 # 클라이언트가 작업을 완료하는데 대기해야 하는 시간
          ###띄어쓰기 있으면 안됨.
    auth-code-expiration-millis: 1800000  # 30 * 60 * 1000 == 30분 이메일 인증 코드의 만료 시간(Millisecond)

  springdoc:
    packages-to-scan: com.ensharp.gayeongsignup #문서화할 패키지
    default-consumes-media-type: application/json;charset=UTF-8 #API가 소비하고 반환할 기본 미디어 타입 지정
    default-produces-media-type: application/json;charset=UTF-8
    swagger-ui:
      path: / #Swagger UI에 접근할 경로설정
      disable-swagger-default-url: true
      display-request-duration: true
      operations-sorter: alpha
      
kind: Application
#server.port : 9090